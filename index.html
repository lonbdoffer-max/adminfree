<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Support - Admin Panel (Delete All Feature)</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Noto+Sans+Bengali:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #0088cc; --dark: #0f172a; --sidebar: #1e293b; --bg: #f1f5f9; --danger: #ff4757; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', 'Noto Sans Bengali', sans-serif; }
        
        #admin-auth-overlay { position: fixed; inset: 0; background: radial-gradient(circle, #1e293b, #0f172a); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .auth-card { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 90%; max-width: 400px; }
        .auth-card input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #eee; border-radius: 15px; outline: none; text-align: center; font-size: 18px; }
        .auth-card button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: 600; }

        body { background: var(--bg); height: 100vh; display: flex; overflow: hidden; }
        #admin-app { display: none; width: 100%; height: 100%; flex-direction: row; }

        .sidebar { width: 320px; background: var(--sidebar); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; background: var(--primary); text-align: center; }
        .search-box { padding: 15px; background: #334155; }
        .search-box input { width: 100%; padding: 10px; border-radius: 8px; border: none; background: #0f172a; color: white; outline: none; }

        #user-list { flex: 1; overflow-y: auto; padding: 10px; }
        .user-item { padding: 15px; border-radius: 12px; margin-bottom: 8px; cursor: pointer; display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.05); }
        .user-item.active { background: var(--primary); }
        .avatar { width: 40px; height: 40px; background: #38bdf8; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #0f172a; font-weight: bold; }

        .main-content { flex: 1; display: flex; flex-direction: column; }
        .notice-editor { padding: 15px 25px; background: white; border-bottom: 1px solid #ddd; display: flex; gap: 15px; align-items: center; }
        .notice-editor input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
        .notice-editor button { padding: 10px 20px; background: var(--dark); color: white; border: none; border-radius: 8px; cursor: pointer; }

        /* Chat Header with Clear Button */
        .chat-header { 
            padding: 15px 25px; background: white; border-bottom: 1px solid #eee; 
            font-weight: 600; font-size: 18px; display: flex; justify-content: space-between; align-items: center;
        }
        .clear-btn { 
            background: var(--danger); color: white; border: none; padding: 8px 15px; 
            border-radius: 8px; cursor: pointer; font-size: 13px; display: none;
        }

        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #f8fafc; }

        .msg-wrapper { display: flex; flex-direction: column; width: 100%; position: relative; }
        .bubble { max-width: 70%; padding: 12px 16px; border-radius: 18px; font-size: 15px; white-space: pre-wrap; position: relative; transition: 0.3s; }
        .user-msg { align-self: flex-start; background: white; color: #1e293b; border: 1px solid #e2e8f0; border-bottom-left-radius: 2px; }
        .admin-msg { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 2px; }
        
        .delete-icon { 
            font-size: 12px; color: var(--danger); cursor: pointer; margin-top: 5px; 
            opacity: 0; transition: 0.3s; padding: 5px; align-self: flex-start;
        }
        .admin-msg + .delete-icon { align-self: flex-end; }
        .msg-wrapper:hover .delete-icon { opacity: 1; }

        .bubble img { max-width: 100%; border-radius: 10px; margin-top: 5px; cursor: pointer; display: block; }
        .time { font-size: 10px; opacity: 0.6; margin-top: 5px; display: block; text-align: right; }

        .input-area { padding: 20px; background: white; border-top: 1px solid #ddd; display: flex; gap: 12px; }
        .input-area input { flex: 1; padding: 15px; border-radius: 30px; border: 1px solid #ddd; background: #f1f5f9; outline: none; }
        .send-btn { width: 50px; height: 50px; border-radius: 50%; border: none; background: var(--primary); color: white; cursor: pointer; font-size: 20px; }
    </style>
</head>
<body>

    <div id="admin-auth-overlay">
        <div class="auth-card">
            <i class="fas fa-user-lock"></i>
            <h2>Admin Login</h2>
            <p>পাসওয়ার্ড: <strong>Akash55</strong></p>
            <input type="password" id="passInput" placeholder="Password লিখুন...">
            <button onclick="checkPass()">Login Access</button>
            <p id="error-msg" style="color: red; margin-top: 10px; font-size: 14px; display: none;">ভুল পাসওয়ার্ড!</p>
        </div>
    </div>

    <div id="admin-app">
        <div class="sidebar">
            <div class="sidebar-header"><h3>Admin Panel</h3></div>
            <div class="search-box"><input type="text" id="userSearch" placeholder="Search ID..." onkeyup="searchUser()"></div>
            <div id="user-list"></div>
        </div>

        <div class="main-content">
            <div class="notice-editor">
                <i class="fas fa-bullhorn" style="color: var(--primary);"></i>
                <input type="text" id="noticeInput" placeholder="ইউজার অ্যাপের নোটিশ লিখুন...">
                <button onclick="updateNotice()">Update</button>
            </div>
            
            <div class="chat-header">
                <span id="chat-title">Select a user</span>
                <button id="clearChatBtn" class="clear-btn" onclick="clearAllChat()"><i class="fas fa-trash-sweep"></i> Clear All Messages</button>
            </div>

            <div id="chat-box"></div>

            <div class="input-area" id="input-wrap" style="visibility: hidden;">
                <input type="text" id="adminReply" placeholder="রিপ্লাই লিখুন...">
                <button class="send-btn" onclick="sendReply()"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        let db;
        let selectedUser = "";

        function checkPass() {
            if(document.getElementById("passInput").value === "Akash55") {
                document.getElementById("admin-auth-overlay").style.display = "none";
                document.getElementById("admin-app").style.display = "flex";
                initFirebase();
            } else {
                document.getElementById("error-msg").style.display = "block";
            }
        }

        function initFirebase() {
            const firebaseConfig = {
                apiKey: "AIzaSyAuishdzb9W6tztpMGo7H-XnZQBrwOclDc",
                authDomain: "freefire-8e27e.firebaseapp.com",
                databaseURL: "https://freefire-8e27e-default-rtdb.firebaseio.com",
                projectId: "freefire-8e27e",
                storageBucket: "freefire-8e27e.appspot.com",
                messagingSenderId: "530194307491",
                appId: "1:530194307491:android:d3202aa452ef21881c6216"
            };
            firebase.initializeApp(firebaseConfig);
            db = firebase.database();

            db.ref("chats").on("value", (snap) => {
                const list = document.getElementById("user-list");
                list.innerHTML = "";
                snap.forEach((child) => {
                    const id = child.key;
                    const div = document.createElement("div");
                    div.className = `user-item ${selectedUser === id ? 'active' : ''}`;
                    div.setAttribute("data-id", id);
                    div.innerHTML = `<div class="avatar">${id.charAt(0)}</div><div style="flex:1">ID: ${id}</div>`;
                    div.onclick = () => {
                        selectedUser = id;
                        document.getElementById("chat-title").innerText = "Chatting with: " + id;
                        document.getElementById("input-wrap").style.visibility = "visible";
                        document.getElementById("clearChatBtn").style.display = "block"; // Show clear button
                        loadChat(id);
                    };
                    list.appendChild(div);
                });
            });

            db.ref("settings/notice").once("value", (snap) => {
                if(snap.exists()) document.getElementById("noticeInput").value = snap.val();
            });
        }

        function loadChat(userId) {
            db.ref("chats/" + userId).on("value", (snap) => {
                const box = document.getElementById("chat-box");
                box.innerHTML = "";
                if(!snap.exists()) {
                    box.innerHTML = "<p style='text-align:center; color: #999; margin-top:20px;'>কোনো মেসেজ নেই।</p>";
                    return;
                }
                snap.forEach((child) => {
                    const data = child.val();
                    const msgId = child.key;
                    const wrapper = document.createElement("div");
                    wrapper.className = "msg-wrapper";
                    
                    const d = document.createElement("div");
                    d.className = `bubble ${data.sender === "admin" ? "admin-msg" : "user-msg"}`;
                    
                    if(data.type === "text") d.textContent = data.message;
                    else if(data.type === "image") d.innerHTML = `<img src="${data.message}" onclick="window.open('${data.message}')">`;
                    else if(data.type === "voice") d.innerHTML = `<audio controls src="${data.message}"></audio>`;
                    
                    d.innerHTML += `<span class="time">${data.time || ''}</span>`;
                    
                    const delIcon = document.createElement("i");
                    delIcon.className = "fas fa-trash-alt delete-icon";
                    delIcon.onclick = () => deleteMessage(userId, msgId);

                    wrapper.appendChild(d);
                    wrapper.appendChild(delIcon);
                    box.appendChild(wrapper);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        // --- নতুন ফিচার: সব মেসেজ ডিলিট করা ---
        function clearAllChat() {
            if(!selectedUser) return;
            if(confirm(`আপনি কি আইডি ${selectedUser}-এর সব মেসেজ মুছে ফেলতে চান? এটি আর ফিরে পাওয়া যাবে না!`)) {
                db.ref("chats/" + selectedUser).remove()
                .then(() => {
                    alert("সব মেসেজ সফলভাবে ডিলিট হয়েছে!");
                    document.getElementById("chat-box").innerHTML = "";
                })
                .catch(err => alert("সমস্যা হয়েছে: " + err));
            }
        }

        function deleteMessage(userId, msgId) {
            if(confirm("এই মেসেজটি ডিলিট করতে চান?")) {
                db.ref(`chats/${userId}/${msgId}`).remove();
            }
        }

        function sendReply() {
            const input = document.getElementById("adminReply");
            const msg = input.value;
            if(!msg || !selectedUser) return;
            const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            db.ref("chats/" + selectedUser).push({ sender: "admin", type: "text", message: msg, time: now });
            input.value = "";
        }

        function updateNotice() {
            const notice = document.getElementById("noticeInput").value;
            db.ref("settings").update({ notice: notice }).then(() => alert("নোটিশ আপডেট হয়েছে!"));
        }

        function searchUser() {
            const q = document.getElementById("userSearch").value.toLowerCase();
            document.querySelectorAll(".user-item").forEach(i => {
                i.style.display = i.getAttribute("data-id").toLowerCase().includes(q) ? "flex" : "none";
            });
        }
    </script>
</body>
</html>
